<svg xmlns="http://www.w3.org/2000/svg" width="850" height="200" viewBox="0 0 850 200">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="850" height="200" fill="#0d0d0d"/>
  
  <circle cx="150" cy="100" r="80" fill="#6366f1" opacity="0.15" filter="url(#glow)">
    <animate attributeName="cx" values="100; 200; 100" dur="10s" repeatCount="indefinite" />
    <animate attributeName="cy" values="80; 120; 80" dur="15s" repeatCount="indefinite" />
  </circle>

  <text x="40" y="95" font-family="'Space Grotesk', 'DM Sans', sans-serif" font-size="48" font-weight="bold" fill="url(#textGrad)" letter-spacing="4">AVISHKAR JAISWAL</text>
  <text x="42" y="140" font-family="'Space Grotesk', 'DM Sans', sans-serif" font-size="20" font-weight="500" fill="#f1f5f9" letter-spacing="1">AI Engineer · Robotics · Edge AI · Full-Stack</text>
  
  <g transform="translate(680, 50)">
    <rect width="130" height="28" rx="14" fill="#6366f1" fill-opacity="0.2" stroke="rgba(255,255,255,0.08)"/>
    <text x="65" y="19" font-family="monospace" font-size="12" fill="#818cf8" font-weight="bold" text-anchor="middle">10 Patents</text>
  </g>
  <g transform="translate(680, 90)">
    <rect width="130" height="28" rx="14" fill="#6366f1" fill-opacity="0.2" stroke="rgba(255,255,255,0.08)"/>
    <text x="65" y="19" font-family="monospace" font-size="12" fill="#818cf8" font-weight="bold" text-anchor="middle">CVR 2025</text>
  </g>
  <g transform="translate(680, 130)">
    <rect width="130" height="28" rx="14" fill="#6366f1" fill-opacity="0.2" stroke="rgba(255,255,255,0.08)"/>
    <text x="65" y="19" font-family="monospace" font-size="12" fill="#818cf8" font-weight="bold" text-anchor="middle">SIH Finalist</text>
  </g>
</svg>
